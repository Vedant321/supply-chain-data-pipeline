version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null

  - name: stg_order_items
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

  - name: stg_products
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: category_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_categories')
                field: category_id

  - name: stg_categories
    columns:
      - name: category_id
        data_tests:
          - unique
          - not_null
      - name: department_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_departments')
                field: department_id

  - name: stg_departments
    columns:
      - name: department_id
        data_tests:
          - unique
          - not_null

  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: segment
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Consumer
                  - Corporate
                  - Home Office
                quote: true
